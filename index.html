<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standards.css">
    <link rel="stylesheet" href="./styles/pokemonBackground.css">

</head>

<body onload="init()">
    <header class="headerSite">
        <div class="headerInner content">
            <div>
                <input id="search-field" class="searchField" type="text" placeholder="Type Pokemon name..."
                    onkeyup="findPokemonName()">
            </div>
        </div>
    </header>
    <div id="loading-spinner" class="loadingSpinner"></div>
    <div class="mainContent">
        <main class="pokemonContainer content" id="pokemon-container">

        </main>

        <button onclick="loadMorePokemon()" class="loadMoreButton">Load More</button>
    </div>
    <dialog class="pokemonDialog" id="pokemon-dialog"></dialog>

    <footer>
        <div class="footerInner">
        </div>
    </footer>
</body>
    <script src="./scripts/templates.js"></script>
<script src="script.js"></script>

</html>
